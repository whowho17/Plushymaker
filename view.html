<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A PlushBouquet for you! 🧸</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:   #FF6B9D;
    --yellow: #FFD93D;
    --mint:   #6BCB77;
    --sky:    #4D96FF;
    --orange: #FF9A3C;
    --purple: #C77DFF;
    --cream:  #FFF8F0;
    --dark:   #2D2D2D;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Festive background */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      radial-gradient(circle at 10% 15%, rgba(255,107,157,0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(77,150,255,0.12) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255,217,61,0.08) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }

  .wrapper { position:relative; z-index:1; }

  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:1rem 2rem;
    background:white;
    border-bottom:3px solid var(--dark);
  }
  .logo-link {
    font-family:'Fredoka One', cursive;
    font-size:1.5rem;
    text-decoration:none;
    color:var(--dark);
  }
  .logo-link span.p { color:var(--pink); }
  .logo-link span.b { color:var(--sky); }

  .btn-make {
    font-family:'Fredoka One', cursive;
    font-size:1rem;
    padding:0.5rem 1.2rem;
    border-radius:100px;
    background:var(--pink);
    color:white;
    border:none;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0 4px 0 #d94f82;
    transition:transform 0.15s, box-shadow 0.15s;
  }
  .btn-make:hover { transform:translateY(-2px); box-shadow:0 6px 0 #d94f82; }

  /* ---- MAIN CONTENT ---- */
  .content {
    max-width: 700px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    text-align: center;
  }

  .headline {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: var(--dark);
    line-height: 1.1;
  }
  .headline span { color: var(--pink); }

  .sub {
    font-size: 1.1rem;
    font-weight: 700;
    color: #888;
    margin-top: -1rem;
  }

  /* ---- BOUQUET DISPLAY ---- */
  .bouquet-card {
    background: white;
    border: 3px solid var(--dark);
    border-radius: 28px;
    box-shadow: 8px 8px 0 var(--dark);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 600px;
    animation: revealCard 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes revealCard {
    from { transform: scale(0.85) translateY(30px); opacity: 0; }
    to   { transform: scale(1) translateY(0);       opacity: 1; }
  }

  .plush-display {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 1.5rem;
    min-height: 120px;
  }

  .plush-item {
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0);      opacity: 1; }
  }
  .plush-item svg { filter: drop-shadow(2px 5px 8px rgba(0,0,0,0.13)); display: block; }

  /* Ribbon separator */
  .ribbon-sep {
    border-top: 2px dashed rgba(0,0,0,0.08);
    padding-top: 1.2rem;
    display: flex;
    justify-content: center;
  }
  .ribbon-sep svg { width: 90px; }

  /* Message block */
  .message-block {
    background: white;
    border: 3px solid var(--dark);
    border-radius: 20px;
    padding: 1.5rem 2rem;
    box-shadow: 6px 6px 0 var(--dark);
    max-width: 500px;
    width: 100%;
    animation: revealCard 0.6s 0.15s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .message-block .label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .message-block .msg-text {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--dark);
    line-height: 1.4;
  }

  /* Confetti burst */
  .confetti-burst {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    overflow: hidden;
  }
  .c-dot {
    position: absolute;
    border-radius: 50%;
    animation: fallDown 2s ease-in forwards;
  }
  @keyframes fallDown {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh)  rotate(720deg); opacity: 0; }
  }

  /* CTA */
  .cta-area {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    animation: revealCard 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 0.75rem 1.8rem;
    border-radius: 100px;
    border: none; cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: translateY(-3px) scale(1.03); }
  .btn-pink {
    background: var(--pink); color: white;
    box-shadow: 0 5px 0 #d94f82, 0 8px 20px rgba(255,107,157,0.3);
  }
  .btn-outline {
    background: white; color: var(--dark);
    border: 3px solid var(--dark);
    box-shadow: 4px 4px 0 var(--dark);
    font-size: 1rem;
  }
  .btn-outline:hover { box-shadow: 6px 6px 0 var(--dark); }

  /* Empty / error */
  .empty-state {
    padding: 3rem;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #ccc;
    text-align: center;
  }

  /* Size variants */
  .sz-sm svg { width: 72px; height: 72px; }
  .sz-md svg { width: 88px; height: 88px; }
  .sz-lg svg { width: 104px; height: 104px; }

  /* Floating deco dots */
  .deco { position:fixed; border-radius:50%; opacity:0.55;
    animation:drift 8s ease-in-out infinite; pointer-events:none; z-index:0; }
  .deco:nth-child(1){ width:16px;height:16px;background:var(--pink);  top:10%;left:7%;  animation-delay:0s; }
  .deco:nth-child(2){ width:12px;height:12px;background:var(--yellow);top:22%;right:9%;animation-delay:1s; }
  .deco:nth-child(3){ width:20px;height:20px;background:var(--mint);  top:68%;left:5%;  animation-delay:2s; }
  .deco:nth-child(4){ width:14px;height:14px;background:var(--sky);   top:80%;right:7%;animation-delay:0.5s;}
  @keyframes drift {
    0%,100%{ transform:translateY(0) rotate(0); }
    50%{ transform:translateY(-12px) rotate(5deg); }
  }
</style>
</head>
<body>

<div class="deco"></div>
<div class="deco"></div>
<div class="deco"></div>
<div class="deco"></div>

<div class="confetti-burst" id="confetti"></div>

<div class="wrapper">
  <header>
    <a href="index.html" class="logo-link"><span class="p">Plush</span><span class="b">Bouquet</span> 🧸</a>
    <a href="builder.html" class="btn-make">🎀 Make yours!</a>
  </header>

  <div class="content" id="content">
    <!-- Rendered by JS -->
  </div>
</div>

<script>

const PLUSHIES = {

    <line x1="60" y1="51" x2="76" y2="49" stroke="#2D2D2D" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="60" y1="55" x2="77" y2="55" stroke="#2D2D2D" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M40 59 Q45 64 50 59" stroke="#2D2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
  </svg>`,
  dog: (s=90) => `<svg width="${s}" height="${s}" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="20" cy="38" rx="12" ry="18" fill="#D4A574" transform="rotate(-20 20 38)"/>
    <ellipse cx="70" cy="38" rx="12" ry="18" fill="#D4A574" transform="rotate(20 70 38)"/>
    <circle cx="45" cy="53" r="30" fill="#D4A574"/>
    <ellipse cx="45" cy="63" rx="16" ry="10" fill="#B8864E"/>
    <ellipse cx="45" cy="38" rx="12" ry="8"  fill="#B8864E"/>

    <circle cx="53" cy="47" r="5" fill="#2D2D2D"/>

    <path d="M39 61 Q45 67 51 61" stroke="#2D2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
  </svg>`,
  panda: (s=90) => `<svg width="${s}" height="${s}" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <circle cx="45" cy="52" r="30" fill="#F5F5F5" stroke="#ddd" stroke-width="1"/>

  penguin: (s=90) => `<svg width="${s}" height="${s}" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <circle cx="45" cy="53" r="30" fill="#2D2D2D"/>
    <ellipse cx="45" cy="60" rx="18" ry="20" fill="#F5F5F5"/>

// ─── PARSE URL ────────────────────────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const plushStr  = params.get('plushies') || '';
const message   = params.get('msg') ? decodeURIComponent(params.get('msg')) : '';
const plushIds  = plushStr ? decodeURIComponent(plushStr).split(',').filter(Boolean) : [];

// ─── RENDER ───────────────────────────────────────────────────────────────────
const content = document.getElementById('content');

if (plushIds.length === 0) {
  content.innerHTML = `
    <div class="empty-state">
      😕 No plushies found in this link!<br><br>
      <a href="builder.html" style="color:#FF6B9D;text-decoration:none;">Build a bouquet →</a>
    </div>`;
} else {
  const sizes = ['sz-sm','sz-md','sz-lg','sz-md','sz-sm'];
  const svgSizes = { 'sz-sm': 76, 'sz-md': 92, 'sz-lg': 108 };

  const itemsHtml = plushIds.map((id, i) => {
    const fn = PLUSHIES[id];
    if (!fn) return '';
    const sz = sizes[i % sizes.length];
    return `<div class="plush-item ${sz}" style="animation-delay:${i * 0.08}s">${fn(svgSizes[sz])}</div>`;
  }).join('');

  const msgHtml = message ? `
    <div class="message-block">
      <div class="label">💌 A message for you</div>
      <div class="msg-text">${message.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>` : '';

  const countLabel = plushIds.length === 1 ? '1 plushie' : `${plushIds.length} plushies`;

  content.innerHTML = `
    <h1 class="headline">Someone sent you a<br><span>Plush Bouquet!</span> 🎀</h1>
    <p class="sub">${countLabel} just for you</p>

    <div class="bouquet-card">
      <div class="plush-display">${itemsHtml}</div>
      <div class="ribbon-sep">
        <svg viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20 Q25 5 50 10 Q75 5 90 20 Q75 35 50 30 Q25 35 10 20Z" fill="#FF6B9D" opacity="0.85"/>
          <ellipse cx="50" cy="20" rx="10" ry="8" fill="#FF8FAB"/>
          <path d="M50 10 Q40 0 30 8" stroke="#d94f82" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M50 10 Q60 0 70 8" stroke="#d94f82" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    ${msgHtml}

    <div class="cta-area">
      <a href="builder.html" class="btn btn-pink">🧸 Make your own bouquet!</a>
      <button class="btn btn-outline" onclick="shareThis()">🔗 Share this</button>
    </div>
  `;

  // Trigger confetti
  launchConfetti();
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#FF6B9D','#FFD93D','#6BCB77','#4D96FF','#FF9A3C','#C77DFF'];
  const burst  = document.getElementById('confetti');
  for (let i = 0; i < 60; i++) {
    const dot = document.createElement('div');
    dot.className = 'c-dot';
    const sz = 6 + Math.random() * 10;
    dot.style.cssText = `
      width:${sz}px; height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;
      top:-20px;
      animation-delay:${Math.random()*1.5}s;
      animation-duration:${1.5 + Math.random()}s;
    `;
    burst.appendChild(dot);
  }
  setTimeout(() => burst.innerHTML = '', 4000);
}

// ─── SHARE ────────────────────────────────────────────────────────────────────
function shareThis() {
  if (navigator.share) {
    navigator.share({ title: 'A PlushBouquet for you! 🧸', url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => {
      alert('Link copied to clipboard! 🎉');
    });
  }
}
</script>
</body>
</html>
